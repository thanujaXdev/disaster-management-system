{% extends 'base.html' %}
{% block title %}Register - DisasterMS{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5">
  <div class="card p-4" style="width:100%;max-width:480px">
    <div class="text-center mb-4">
      <i class="fas fa-user-plus fa-3x text-danger mb-2"></i>
      <h4 class="fw-bold">Create Account</h4>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Your email" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create a password" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Register As</label>
        <select name="role" class="form-select" id="roleSelect" onchange="toggleSkills()">
          <option value="citizen">Citizen</option>
          <option value="volunteer">Volunteer</option>
        </select>
      </div>
      <div class="mb-3" id="skillsDiv" style="display:none">
        <label class="form-label fw-semibold">Your Skills</label>
        <input type="text" name="skills" class="form-control" placeholder="e.g. First Aid, Driving, Cooking">
        <small class="text-muted">Comma-separated skills</small>
      </div>
      <button type="submit" class="btn btn-danger w-100 fw-bold"><i class="fas fa-user-plus me-2"></i>Register</button>
    </form>
    <hr>
    <div class="text-center"><small class="text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-danger fw-bold">Login</a></small></div>
  </div>
</div>
<script>
function toggleSkills() {
  var role = document.getElementById('roleSelect').value;
  document.getElementById('skillsDiv').style.display = role === 'volunteer' ? 'block' : 'none';
}
</script>
{% endblock %}
