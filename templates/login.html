{% extends 'base.html' %}
{% block title %}Login - DisasterMS{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh">
  <div class="card p-4" style="width:100%;max-width:420px">
    <div class="text-center mb-4">
      <i class="fas fa-shield-alt fa-3x text-danger mb-2"></i>
      <h4 class="fw-bold">Login to DisasterMS</h4>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-danger w-100 fw-bold"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
    </form>
    <hr>
    <div class="text-center">
      <small class="text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="text-danger fw-bold">Register here</a></small>
    </div>
    <div class="mt-3 p-3 rounded" style="background:#f8fafc;font-size:0.8rem">
      <strong>Demo Login:</strong><br>
      Admin: admin@disaster.com / admin123
    </div>
  </div>
</div>
{% endblock %}
