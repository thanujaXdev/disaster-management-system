{% extends 'base.html' %}
{% block title %}Report Disaster - DisasterMS{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container">
    <h1><i class="fas fa-exclamation-triangle me-2"></i>Report a Disaster</h1>
    <p style="color:#94a3b8">Fill in the details below. Admin will verify and act on your report.</p>
  </div>
</div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-4">
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label fw-semibold">Disaster Type</label>
            <select name="disaster_type" class="form-select" required>
              <option value="">-- Select Type --</option>
              <option>Flood</option><option>Earthquake</option><option>Cyclone</option>
              <option>Fire</option><option>Landslide</option><option>Drought</option><option>Other</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Location</label>
            <input type="text" name="location" class="form-control" placeholder="e.g. Vijayawada, Andhra Pradesh" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="4" placeholder="Describe what happened, how many people affected..." required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Upload Photo (optional)</label>
            <input type="file" name="photo" class="form-control" accept="image/*">
            <small class="text-muted">Max 5MB. JPG, PNG accepted.</small>
          </div>
          <button type="submit" class="btn btn-danger w-100 fw-bold"><i class="fas fa-paper-plane me-2"></i>Submit Report</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
